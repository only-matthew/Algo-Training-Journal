<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>算法训练日志</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <div id="auth-bar">
      <div class="auth-left">
        <span id="auth-status">未登录</span>
      </div>
      <div class="auth-right">
        <button id="btn-submit" class="btn btn-primary" style="display:none">📝 提交记录</button>
        <button id="btn-login" class="btn btn-outline">🔐 使用 GitHub 登录</button>
        <button id="btn-logout" class="btn btn-outline" style="display:none">退出</button>
      </div>
    </div>

    <header class="header">
      <div>
        <h1>队伍算法训练日志</h1>
        <p class="subtitle">用 GitHub 登录后，直接在此页面填写训练记录，无需学习 Git 命令</p>
      </div>
      <div class="filter">
        <label for="member-select">查看对象</label>
        <select id="member-select">
          <option value="all">全队</option>
        </select>
      </div>
    </header>

    <section class="grid metrics">
      <article class="card">
        <p class="metric-label">近 30 天训练题数</p>
        <p id="metric-total" class="metric-value">0</p>
      </article>
      <article class="card">
        <p class="metric-label">近 30 天训练天数</p>
        <p id="metric-days" class="metric-value">0</p>
      </article>
      <article class="card">
        <p class="metric-label">近 30 天周均频率</p>
        <p id="metric-weekly" class="metric-value">0</p>
      </article>
    </section>

    <section class="card">
      <h2>训练热力图（近 365 天）</h2>
      <p class="hint">颜色越深表示当日记录越多</p>
      <div id="heatmap" class="heatmap"></div>
    </section>

    <section class="grid stats">
      <article class="card">
        <h2>来源统计（近 30 天）</h2>
        <div id="platform-stats"></div>
      </article>
      <article class="card">
        <h2>难度统计（近 30 天，可选）</h2>
        <div id="difficulty-stats"></div>
      </article>
    </section>

    <section class="card">
      <h2>训练记录</h2>
      <p id="record-count" class="hint"></p>
      <div id="records" class="records"></div>
    </section>

    <footer class="footer">
      <p>GitHub 登录后，点击「📝 提交记录」即可添加训练日志</p>
    </footer>

    <!-- 提交模态框 -->
    <div id="submit-modal" class="modal-overlay" style="display:none">
      <div class="modal">
        <div class="modal-header">
          <h2>📝 提交训练记录</h2>
          <button id="btn-close-modal" class="btn-icon">&times;</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label for="submit-date">训练日期</label>
            <input type="date" id="submit-date" class="form-input" />
          </div>
          <div id="problem-list">
            <!-- 动态生成 -->
          </div>
          <button id="btn-add-problem" class="btn btn-outline btn-sm">＋ 添加一道题</button>
          <div class="modal-actions">
            <span id="submit-msg" class="submit-msg"></span>
            <button id="btn-save" class="btn btn-primary">提交到 GitHub</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
